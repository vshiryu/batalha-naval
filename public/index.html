<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1929" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Batalha Naval — Comando Tático</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%9A%93%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- WebGL ocean + boards render here, full-screen behind the HUD -->
  <div id="game-canvas"></div>

  <!-- HUD overlay (pointer-events disabled except on interactive controls) -->
  <div id="ui">

    <!-- Top bar (placement + battle) -->
    <header id="topbar" class="hidden">
      <button id="btn-mute" class="icon-btn" aria-label="Mudo" title="Mudo">
        <span class="ico-on">🔊</span><span class="ico-off">🔇</span>
      </button>
      <div id="turn-banner"><span id="turn-text">Aguardando…</span></div>
      <div id="enemy-fleet" class="fleet-strip" title="Frota inimiga restante"></div>
    </header>

    <!-- Event ticker -->
    <div id="event-ticker" class="hidden"></div>

    <!-- LOBBY -->
    <section id="screen-lobby" class="screen">
      <div class="center-card glass">
        <div class="logo">
          <div class="logo-mark">⚓</div>
          <h1>BATALHA<span>NAVAL</span></h1>
          <p class="subtitle">Comando Naval Tático</p>
        </div>
        <div id="lobby-status">
          <div class="spinner"></div>
          <p id="lobby-text">Conectando ao servidor…</p>
          <p id="lobby-role" class="role-tag"></p>
        </div>
        <p class="hint">Conecte os dois celulares na mesma rede Wi-Fi.</p>
      </div>
    </section>

    <!-- PLACEMENT -->
    <section id="screen-placement" class="screen hidden">
      <div id="placement-header" class="panel-top glass">
        <h2>Posicione sua frota</h2>
        <p class="muted">Arraste para mover · toque num navio e gire</p>
        <div id="opponent-status" class="muted small">Oponente: posicionando…</div>
      </div>
      <div id="placement-tray" class="glass"></div>
      <div id="placement-controls" class="bottom-bar glass">
        <button id="btn-random" class="ctl-btn">🎲 Aleatório</button>
        <button id="btn-rotate" class="ctl-btn">⟳ Girar</button>
        <button id="btn-confirm" class="ctl-btn primary">✓ Confirmar</button>
      </div>
    </section>

    <!-- BATTLE -->
    <section id="screen-battle" class="screen hidden">
      <div id="battle-bottom">
        <div id="energy-wrap" class="glass">
          <div class="energy-label">ENERGIA</div>
          <div id="energy-bar"><div id="energy-fill"></div><span id="energy-val">0</span></div>
        </div>

        <div id="torpedo-controls" class="glass hidden">
          <button class="t-btn" data-orient="row">Linha ▭</button>
          <button class="t-btn" data-orient="col">Coluna ▯</button>
          <button class="t-btn" id="t-dir">Sentido ⇄</button>
        </div>

        <div id="powerups" class="glass"></div>

        <div id="action-row">
          <button id="btn-peek" class="ctl-btn">👁 Espiar</button>
          <button id="btn-fire" class="fire-btn" disabled>FOGO!</button>
          <div id="your-fleet" class="fleet-strip mini" title="Sua frota"></div>
        </div>
      </div>
    </section>

    <!-- END -->
    <section id="screen-end" class="screen hidden">
      <div class="center-card glass">
        <h1 id="end-title">VITÓRIA</h1>
        <p id="end-sub" class="subtitle"></p>
        <div id="end-stats" class="muted small"></div>
        <button id="btn-rematch" class="ctl-btn primary big">↻ Revanche</button>
        <p id="rematch-status" class="muted small"></p>
      </div>
    </section>

    <!-- transient connection toast -->
    <div id="toast" class="hidden"></div>
  </div>

  <!-- Libraries served locally (single port, no CDN needed) -->
  <script src="/vendor/pixi/pixi.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
